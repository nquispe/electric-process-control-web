<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#143861"/><stop offset="1" stop-color="#0a1828"/></linearGradient>
    <radialGradient id="beam" cx="0.2" cy="0.3" r="0.9"><stop offset="0" stop-color="#38bdf8" stop-opacity="0.35"/><stop offset="1" stop-color="#38bdf8" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg3)"/>
  <!-- field of view -->
  <path d="M250 170 L 720 360 L 720 540 L 250 250 Z" fill="url(#beam)"/>
