    <circle cx="340" cy="210" r="30" fill="#0a1828" stroke="#38bdf8" stroke-width="3"/>
    <circle cx="340" cy="210" r="16" fill="#143861"/>
    <circle cx="334" cy="204" r="5" fill="#cfe9ff"/>
    <rect x="195" y="188" width="40" height="14" rx="4" fill="#f5b301"/>
  </g>
  <!-- recording dot -->
  <circle cx="600" cy="120" r="14" fill="#e63946"/>
  <text x="624" y="128" fill="#e8edf3" font-family="Arial" font-size="22" font-weight="bold">REC</text>
  <!-- grid floor -->
